'NEOSidekick.MarkdownForAgents:ContentSignalsMixin':
  abstract: true
  ui:
    inspector:
      groups:
        agentsContentSignals:
          label: i18n
          icon: 'icon-tags'
          position: 950
          tab: seo
  properties:
    contentSignalAiTrain:
      type: boolean
      defaultValue: true
      ui:
        label: i18n
        help:
          message: i18n
        inspector:
          group: agentsContentSignals
          position: 10
    contentSignalSearch:
      type: boolean
      defaultValue: true
      ui:
        label: i18n
        help:
          message: i18n
        inspector:
          group: agentsContentSignals
          position: 20
    contentSignalAiInput:
      type: boolean
      defaultValue: true
      ui:
        label: i18n
        help:
          message: i18n
        inspector:
          group: agentsContentSignals
          position: 30
    llmsTxt:
      type: string
      ui:
        label: i18n
        help:
          message: i18n
        inspector:
          group: agentsContentSignals
          position: 40
          editor: 'Neos.Neos/Inspector/Editors/RichTextEditor'
          editorOptions:
            placeholder: 'ClientEval: node.properties.title ? (node.properties.metaDescription ? node.properties.title + " — " + node.properties.metaDescription : node.properties.title) : (node.properties.metaDescription ? node.properties.metaDescription : "")'
            autoparagraph: true
            formatting:
              p: true
              strong: true
              em: true
              a: true
              ul: true
              ol: true
              h2: true
              h3: true
              h4: true
              h5: true
              h6: true
    llmsTxtNavigationLevels:
      type: integer
      ui:
        label: i18n
        help:
          message: i18n
        inspector:
          group: agentsContentSignals
          position: 50
          editor: 'Neos.Neos/Inspector/Editors/SelectBoxEditor'
          editorOptions:
            allowEmpty: true
            placeholder: i18n
            values:
              1:
                label: i18n
              2:
                label: i18n
              3:
                label: i18n
              4:
                label: i18n
              5:
                label: i18n

'Neos.Neos:Site':
  superTypes:
    'NEOSidekick.MarkdownForAgents:ContentSignalsMixin': true
